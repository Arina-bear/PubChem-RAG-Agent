services:
  api:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    command: ["uv", "run", "uvicorn", "app.main:app", "--app-dir", "src", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      QUERY_RATE_LIMIT_PER_SECOND: 3

  chainlit:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    command: ["uv", "run", "chainlit", "run", "src/chainlit_app.py", "--headless", "--host", "0.0.0.0", "--port", "3000"]
    ports:
      - "3000:3000"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
